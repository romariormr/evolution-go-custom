# Evolution GO Custom — standalone deployment (no Coolify / no PaaS required).
#
# This compose builds the application image FROM SOURCE (using the repository's
# Dockerfile), so it runs the custom fork code — not the upstream published image.
# Postgres is kept INTERNAL to the compose network (no host port exposed).
#
# Usage (handled automatically by install.sh):
#   cd deploy && docker compose up -d --build
#
# All secrets/config live in ./deploy/.env (generated by install.sh).

name: evolution-go

services:
  evolution-go:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VERSION: ${APP_VERSION:-custom}
    image: evolution-go-custom:local
    container_name: evolution-go
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evolution_data:/app/dbdata
      - evolution_logs:/app/logs
    networks:
      - evolution_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${SERVER_PORT:-8080}/manager"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — run install.sh}
      POSTGRES_DB: postgres
    # NOTE: intentionally NO "ports:" mapping — Postgres is reachable only from
    # the app over the internal Docker network, never from the public internet.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - evolution_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  evolution_data:
    driver: local
  evolution_logs:
    driver: local
  postgres_data:
    driver: local

networks:
  evolution_network:
    driver: bridge
